<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NToolkit — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --accent2: #7b5ea7;
    --text: #e8e8f0;
    --muted: #5a5a6e;
    --error: #ff5566;
    --success: #47ffb0;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--accent2); top: -100px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent); top: 60%; right: -100px; animation-delay: -4s; }
  .blob-3 { width: 300px; height: 300px; background: #3a7bd5; bottom: -50px; left: 30%; animation-delay: -8s; }

  @keyframes drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, 30px) scale(1.08); }
  }

  /* Grid overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .login-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 20px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  .brand-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .brand-icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 30px rgba(232,255,71,0.3);
  }
  .brand-name {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .brand-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }

  .card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }
  .card p { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,255,71,0.1);
  }
  .field input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    letter-spacing: 0.3px;
    margin-top: 8px;
  }
  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 25px rgba(232,255,71,0.35);
  }
  .btn:active { transform: translateY(0); }

  .error-msg {
    display: none;
    background: rgba(255,85,102,0.1);
    border: 1px solid rgba(255,85,102,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--error);
    margin-bottom: 16px;
    text-align: center;
  }
  .error-msg.show { display: block; animation: shake 0.4s; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60%  { transform: translateX(-6px); }
    40%,80%  { transform: translateX(6px); }
  }

  .admin-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .admin-link:hover { color: var(--accent2); }

  @media (max-width: 480px) {
    .card { padding: 24px; }
  }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon">🧰</div>
      <span class="brand-name">NToolkit</span>
    </div>
    <p class="brand-sub">Engineering Tools Dashboard</p>
  </div>

  <div class="card">
    <h2>Welcome back</h2>
    <p>Sign in to access your tools</p>

    <div class="error-msg" id="errMsg">❌ Invalid credentials. Try again.</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>

    <button class="btn" onclick="doLogin()">Sign In →</button>
  </div>

  <a href="admin.html" class="admin-link">⚙ Admin Panel</a>
</div>

<script src="users.js"></script>
<script>
  // Already logged in? Redirect
  if (localStorage.getItem('ntoolkit_user')) {
    window.location.href = 'dashboard.html';
  }

  function doLogin() {
    const u = document.getElementById('username').value.trim().toLowerCase();
    const p = document.getElementById('password').value;
    const err = document.getElementById('errMsg');

    const match = USERS.find(x => x.username === u && x.password === p && x.active);

    if (match) {
      localStorage.setItem('ntoolkit_user', JSON.stringify({ username: match.username, name: match.name, role: match.role }));
      window.location.href = 'dashboard.html';
    } else {
      err.className = 'error-msg show';
      setTimeout(() => err.className = 'error-msg', 3000);
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
