name: Reconstruct Content Studio v2

on:
  push:
    branches:
      - agent/advanced-content-studio-v2
    paths:
      - .github/workflows/reconstruct-admin-v2.yml

permissions:
  contents: write

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/advanced-content-studio-v2

      - name: Reconstruct and verify source files
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .staging/admin-v2/index.html.gz.b64 | gzip --decompress > admin/index.html
          base64 --decode .staging/admin-v2/admin.css.gz.b64 | gzip --decompress > admin/admin.css
          cat .staging/admin-v2/admin.js.gz.b64.part* | base64 --decode | gzip --decompress > admin/admin.js

          echo "7c6dab40370702f130514e3021b762b046d665dbcac8e7eaeb84d2f0fa75762b  admin/index.html" | sha256sum --check -
          echo "7302f8350a1f4bd7dbc3d07b0597677a070f4fff21211a9fa5e4a93ac2e11dca  admin/admin.css" | sha256sum --check -
          echo "9d64d2e926ccb505adb434a559af7bad28c7ed76ad321584a2ba35933fe840d1  admin/admin.js" | sha256sum --check -
          node --check admin/admin.js
          rm -rf .staging/admin-v2

      - name: Commit reconstructed studio
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Build advanced Content Studio"
          git push origin HEAD:agent/advanced-content-studio-v2
