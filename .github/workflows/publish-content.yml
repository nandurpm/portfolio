name: Publish uploaded content

on:
  push:
    branches: [main]
    paths:
      - "uploads/blog/**"
      - "uploads/projects/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portfolio-content-publisher
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate and publish uploads
        run: node scripts/publish-content.mjs

      - name: Commit generated website files
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog works assets/data assets/images uploads
          git commit -m "Publish website content [skip ci]"
          git push
