name: Assemble Content Studio v2

on:
  push:
    branches:
      - agent/content-studio-v2
    paths:
      - '.admin-v2/**'
      - '.github/workflows/admin-v2-build.yml'

permissions:
  contents: write

concurrency:
  group: content-studio-v2-build
  cancel-in-progress: false

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble and validate production files
        shell: bash
        run: |
          set -euo pipefail
          cat .admin-v2/admin__index_html.part* > admin/index.html
          cat .admin-v2/admin__admin_css.part* > admin/admin.css
          cat .admin-v2/admin__admin_js.part* > admin/admin.js
          node --check admin/admin.js
          node --check functions/api/github/oauth/config.js
          node --check functions/api/github/oauth/start.js
          node --check functions/api/github/oauth/callback.js
          test -s admin/index.html
          test -s admin/admin.css
          test -s admin/admin.js
          rm -rf .admin-v2
          rm -f .github/workflows/admin-v2-build.yml

      - name: Commit assembled Content Studio
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Build advanced Content Studio"
          git push
