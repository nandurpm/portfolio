<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>College Notes — Nandakumar M</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<nav id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-circle">N</span> My Portfolio</a>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="index.html#about" class="nav-link">About Me</a></li>
      <li><a href="index.html#works" class="nav-link">My Works</a></li>
      <li><a href="notes.html" class="nav-link active">College Notes</a></li>
      <li><a href="technical.html" class="nav-link">Technical</a></li>
      <li><a href="index.html#contact" class="nav-link">Contact</a></li>
    </ul>
    <button class="hamburger" id="hamburger">&#9776;</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="notes.html">College Notes</a>
    <a href="technical.html">Technical</a>
    <a href="index.html#contact">Contact</a>
  </div>
</nav>

<section class="section" style="padding-top:100px">
  <div class="container">
    <div class="section-header">
      <span class="section-label">Study Resources</span>
      <h2 class="section-title">College Notes</h2>
      <p class="section-sub">Engineering notes, references, and study materials.</p>
    </div>
    <div class="resources-grid" id="notesGrid">
      <p style="color:var(--text2)">Loading notes...</p>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="footer-bottom" style="max-width:1200px;margin:0 auto">
    <span>© 2026 Nandakumar M. All Rights Reserved.</span>
    <a href="index.html" style="color:var(--amber)">← Back to Portfolio</a>
  </div>
</footer>

<script>
fetch("notes.json")
  .then(r => r.json())
  .then(data => {
    const grid = document.getElementById("notesGrid");
    grid.innerHTML = data.map(item => `
      <div class="card fade-in">
        <div class="card-img">📝</div>
        <p class="card-category">${item.category}</p>
        <h3 class="card-title">${item.title}</h3>
        <p class="card-date">${item.date}</p>
        <p class="card-desc">${item.description}</p>
        <a href="${item.link}" class="card-link" target="_blank">View Notes →</a>
      </div>`).join("");
    document.querySelectorAll(".fade-in").forEach((el,i) => {
      setTimeout(() => el.classList.add("visible"), i * 80);
    });
  })
  .catch(() => {
    document.getElementById("notesGrid").innerHTML = "<p style='color:var(--text2)'>Could not load notes. Add entries to notes.json.</p>";
  });

document.getElementById("hamburger")?.addEventListener("click", () => {
  document.getElementById("mobileMenu")?.classList.toggle("open");
});
</script>
</body>
</html>
