name: Apply advanced Content Studio

on:
  push:
    branches:
      - agent/content-studio-final
    paths:
      - .github/workflows/apply-content-studio.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: agent/content-studio-final
          fetch-depth: 0

      - name: Copy tested Content Studio files
        run: |
          git fetch origin agent/advanced-content-studio-v2:refs/remotes/origin/agent/advanced-content-studio-v2
          git checkout origin/agent/advanced-content-studio-v2 -- \
            admin/index.html \
            admin/admin.css \
            admin/admin.js \
            admin/config.js \
            admin/README.md \
            assets/data/media.json

      - name: Validate JavaScript and interface structure
        run: |
          node --check admin/admin.js
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
                  self.scripts = []
              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if values.get('id'):
                      self.ids.append(values['id'])
                  if tag == 'script' and values.get('src'):
                      self.scripts.append(values['src'])

          inspector = Inspector()
          inspector.feed(Path('admin/index.html').read_text(encoding='utf-8'))
          duplicates = sorted({value for value in inspector.ids if inspector.ids.count(value) > 1})
          required = {'authScreen', 'studioApp', 'githubLoginButton', 'tokenLoginForm', 'contentTable', 'richEditor', 'previewModal', 'publishProgressModal'}
          missing = sorted(required - set(inspector.ids))
          if duplicates:
              raise SystemExit(f'Duplicate IDs: {duplicates}')
          if missing:
              raise SystemExit(f'Missing required IDs: {missing}')
          if inspector.scripts[-2:] != ['config.js', 'admin.js']:
              raise SystemExit(f'Unexpected script order: {inspector.scripts}')
          print(f'Validated {len(inspector.ids)} interface IDs')
          PY

      - name: Commit generated result
        run: |
          rm .github/workflows/apply-content-studio.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add admin assets/data/media.json .github/workflows/apply-content-studio.yml
          git commit -m "Restore advanced Content Studio dashboard"
          git push origin HEAD:agent/content-studio-final
