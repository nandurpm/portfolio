<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Blog by Nandakumar M featuring technology notes, engineering ideas, current affairs, movie reviews, politics, and personal writing.">
  <meta property="og:title" content="Blog | Nandakumar M">
  <meta property="og:description" content="Thoughts, notes, and reviews across engineering, technology, current affairs, cinema, politics, and personal writing.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://nandakumarm.dpdns.org/blog.html">
  <title>Blog | Nandakumar M</title>
  <link rel="icon" href="assets/images/logo.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .blog-hero-compact {
      padding: clamp(18px, 3vw, 34px);
      margin-bottom: 10px;
    }
    .blog-hero-compact .eyebrow {
      margin-bottom: 6px;
    }
    .blog-hero-compact h1 {
      max-width: 860px;
      margin-bottom: 8px;
      font-size: clamp(1.75rem, 3.8vw, 3.35rem);
      line-height: 1.02;
    }
    .blog-hero-compact p {
      max-width: 900px;
      margin-bottom: 0;
      line-height: 1.55;
    }
    .blog-page .section {
      margin-top: 0;
    }
    .blog-page .blog-tools {
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="site-shell blog-page">
    <header class="site-header glass">
      <a class="brand" href="index.html"><span class="brand-mark">NM</span><span><strong>Nandakumar M</strong><small>Electrical &amp; Electronics Design Engineer</small></span></a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a class="active" href="blog.html" aria-current="page">Blog</a>
        <a href="about.html">About</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Toggle dark and light theme"><span class="theme-icon" aria-hidden="true"></span></button>
    </header>

    <main>
      <section class="page-hero glass blog-hero-compact" data-aos="fade-up">
        <p class="eyebrow">Blog</p>
        <h1>Engineering notes, reviews, and personal thoughts.</h1>
        <p>Search posts on technology, engineering, current affairs, cinema, politics, and personal writing.</p>
      </section>

      <section class="section">
        <div class="blog-tools glass" data-aos="fade-up">
          <label class="search-box">
            <span>Search posts</span>
            <input id="blogSearch" type="search" placeholder="Search by title, tag, or excerpt">
          </label>
          <label class="category-box">
            <span>Category</span>
            <select id="blogCategory" aria-label="Filter blog category">
              <option value="all">All Categories</option>
              <option>Technical Articles</option>
              <option>Engineering</option>
              <option>Current Affairs</option>
              <option>Movie Reviews</option>
              <option>Politics</option>
              <option>Personal Writings</option>
            </select>
          </label>
        </div>
        <div class="card-grid blog-grid" id="blogList">
          <p class="empty-state">Loading blog posts...</p>
        </div>
        <div class="pagination" id="blogPagination" aria-label="Blog pagination"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span data-year></span> Nandakumar M.</p>
      <div><a href="mailto:nandakumarmkdpm@gmail.com">Email</a><a href="https://github.com/nandurpm" target="_blank" rel="noopener noreferrer">GitHub</a></div>
    </footer>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/blog.js"></script>
  <script src="assets/js/blog-card-navigation.js"></script>
</body>
</html>
